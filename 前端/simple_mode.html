<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>簡易模式 - 宮廟人流決策分析</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #F2EBE1; font-family: "Microsoft JhengHei", sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* 左側側邊欄 */
        .sidebar-left { width: 20%; background: #8B0000; color: white; padding: 20px; overflow-y: auto; position: relative; overflow-y: visible;
            overflow-x: visible; /* 🔥 加這行 */
            z-index: 10;}
        .sidebar-title { font-size: 22px; font-weight: 900; margin-bottom: 20px; border-bottom: 2px solid #FFD700; padding-bottom: 10px; }
        .back-home { text-decoration: none; display: flex; align-items: center; background: rgba(255,255,255,0.2); padding: 10px; border-radius: 8px; margin-bottom: 20px; color: white; font-weight: bold; transition: 0.3s; }
        .event-item { padding: 15px; border-bottom: 1px solid #a52a2a; cursor: pointer; font-weight: bold; position: relative; }
        .event-item:hover { background: #a52a2a; }
        .popover { display: none; position: absolute; left: 105%; top: 50%; transform: translateY(-50%); background: white; color: #333; padding: 15px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); width: 180px; z-index: 1000; border-left: 5px solid #FFD700; }
        .event-item:hover .popover { display: block; }

        /* 中間：分析結果展示區 */
        .main-content { flex: 1; background: white; margin: 20px; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); overflow-y: auto; }
        .prediction-card { text-align: center; padding: 20px; background: #fdfaf5; border-radius: 12px; margin-bottom: 20px; border: 1px solid #eee; }
        .prediction-number { font-size: 48px; font-weight: 900; color: #8B0000; line-height: 1; }
        
        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .metric-box { background: white; padding: 12px; border-radius: 8px; border: 1px solid #eee; }
        .metric-label { font-size: 0.8rem; color: #666; margin-bottom: 3px; }
        .metric-value { font-size: 1rem; font-weight: bold; color: #333; }

        .charts-row { display: flex; gap: 15px; margin-top: 15px; height: 280px; }
        .chart-box { flex: 1; background: #fff; border: 1px solid #f2ebe1; padding: 12px; border-radius: 12px; position: relative; }
        .chart-title { font-size: 0.95rem; font-weight: bold; text-align: center; margin-bottom: 8px; color: #8B0000; }

        /* 右側：參數面板 */
        .sidebar-right { width: 25%; background: #fff; padding: 20px; border-left: 1px solid #eee; overflow-y: auto; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-weight: bold; margin-bottom: 4px; color: #555; font-size: 0.85rem; }
        .input-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; }
        .btn-predict { width: 100%; padding: 12px; background: #8B0000; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: 900; cursor: pointer; transition: 0.3s; margin-top: 5px; }
        .btn-predict:hover { background: #a52a2a; }
    </style>
</head>
<body>

    <div class="sidebar-left">
        <a href="/" class="back-home"><span>🏠</span> 回到首頁</a>
        <div class="sidebar-title">歷史活動列表</div>
        <div class="event-item">2025 歲末祈福法會<div class="popover"><label>數據年份</label><select><option>2024</option></select></div></div>
        <div class="event-item">萬年季：乞龜慶典<div class="popover"><label>數據年份</label><select><option>2024</option></select></div></div>
    </div>

    <div class="main-content">
        <div class="prediction-card">
            <h3 style="margin:0 0 10px 0; color:#8B0000;">AI 預測分析結果</h3>
            <div class="prediction-number" id="pred-value">--</div>
            <div id="confidence-range" style="color: #888; font-size: 0.9rem;">(置信區間：-- ~ --)</div>
            
            <div class="metrics-grid">
                <div class="metric-box">
                    <div class="metric-label">建議預算方案</div>
                    <div class="metric-value" id="suggested-budget">TWD --</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">預期人流提升</div>
                    <div class="metric-value" id="improvement-pct" style="color: #006400;">-- %</div>
                </div>
                <div class="metric-box">
                    <div class="metric-label">核心驅動因素</div>
                    <div class="metric-value" id="top-driver">--</div>
                </div>
            </div>
        </div>

        <div class="charts-row">
            <div class="chart-box">
                <div class="chart-title">策略效益分析</div>
                <canvas id="roiChart"></canvas>
            </div>
            <div class="chart-box">
                <div class="chart-title">因素影響權重</div>
                <canvas id="importanceChart"></canvas>
            </div>
        </div>

        <div class="charts-row">
            <div class="chart-box" style="flex: 1.5;">
                <div class="chart-title">社群媒體曝光分佈</div>
                <canvas id="socialChart"></canvas>
            </div>
            <div class="chart-box">
                <div class="chart-title">工作人員建議</div>
                <div style="text-align: center; padding-top: 40px;">
                    <span id="staff-suggest" style="font-size: 3rem; font-weight: 900; color: #8B0000;">--</span>
                    <p style="color: #666; margin: 5px 0 0 0;">人 (最佳效能)</p>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar-right">
        <h3 style="margin-top: 0; color: #8B0000; border-bottom: 2px solid #F2EBE1; padding-bottom: 10px;">分析參數</h3>
        <div class="input-group"><label>FB 曝光量</label><input type="number" id="FB_exposure" value="3000"></div>
        <div class="input-group"><label>IG 曝光量</label><input type="number" id="IG_exposure" value="1500"></div>
        <div class="input-group"><label>YT 曝光量</label><input type="number" id="YT_exposure" value="1000"></div>
        <div class="input-group"><label>廣告預算 (TWD)</label><input type="number" id="Ad_spend" value="15000"></div>
        <div class="input-group"><label>活動時數</label><input type="number" id="duration_hours" value="8"></div>
        <div class="input-group"><label>現有人手</label><input type="number" id="num_staff" value="20"></div>
        <button class="btn-predict" onclick="runPrediction()">執行 AI 分析</button>
    </div>

    <script>
        let roiChart, importanceChart, socialChart;

        async function runPrediction() {
            const payload = {
                FB_exposure: parseInt(document.getElementById('FB_exposure').value),
                IG_exposure: parseInt(document.getElementById('IG_exposure').value),
                YT_exposure: parseInt(document.getElementById('YT_exposure').value),
                Ad_spend: parseInt(document.getElementById('Ad_spend').value),
                duration_hours: parseInt(document.getElementById('duration_hours').value),
                prize_value: 5000, 
                num_staff: parseInt(document.getElementById('num_staff').value),
                queue_design_score: 0.8, is_weekend: 1, is_holiday: 0, weather_score: 0.9, past_avg: 1000, past_max: 2000
            };

            try {
                const response = await fetch('http://127.0.0.1:8000/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await response.json();

                // 1. 更新數值
                document.getElementById('pred-value').innerText = data.prediction.toLocaleString();
                if(data.confidence_interval) {
                    document.getElementById('confidence-range').innerText = `(置信區間：${data.confidence_interval.lower} ~ ${data.confidence_interval.upper})`;
                }

                const roi = data.roi_optimization;
                document.getElementById('suggested-budget').innerText = `TWD ${roi.best_config.Ad_spend.toLocaleString()}`;
                document.getElementById('staff-suggest').innerText = roi.best_config.num_staff;
                
                const impPct = ((roi.best_config_prediction - data.prediction) / data.prediction * 100).toFixed(1);
                document.getElementById('improvement-pct').innerText = `+${impPct}%`;

                // 找出最強因素
                const sortedImp = Object.entries(data.feature_importance).sort((a,b) => b[1] - a[1]);
                document.getElementById('top-driver').innerText = sortedImp[0][0].replace('_',' ');

                // 2. 策略效益圖表
                const roiCtx = document.getElementById('roiChart').getContext('2d');
                if (roiChart) roiChart.destroy();
                roiChart = new Chart(roiCtx, {
                    type: 'bar',
                    data: {
                        labels: ['目前', '優化建議'],
                        datasets: [
                            { label: '人流', data: [data.prediction, roi.best_config_prediction], backgroundColor: '#8B0000', yAxisID: 'y' },
                            { label: '成本', data: [payload.Ad_spend, roi.best_config.Ad_spend], backgroundColor: '#FFD700', yAxisID: 'y1' }
                        ]
                    },
                    options: { 
                        responsive: true, maintainAspectRatio: false,
                        scales: { y1: { position: 'right', grid: { drawOnChartArea: false } } }
                    }
                });

                // 3. 重要性圖表
                const impCtx = document.getElementById('importanceChart').getContext('2d');
                if (importanceChart) importanceChart.destroy();
                importanceChart = new Chart(impCtx, {
                    type: 'bar',
                    data: {
                        labels: sortedImp.map(i => i[0]),
                        datasets: [{ label: '權重', data: sortedImp.map(i => i[1]), backgroundColor: '#8B0000' }]
                    },
                    options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false }
                });

                // 4. 社群分析圖表
                const socialCtx = document.getElementById('socialChart').getContext('2d');
                if (socialChart) socialChart.destroy();
                socialChart = new Chart(socialCtx, {
                    type: 'pie',
                    data: {
                        labels: ['FB', 'IG', 'YT'],
                        datasets: [{
                            data: [payload.FB_exposure, payload.IG_exposure, payload.YT_exposure],
                            backgroundColor: ['#1877F2', '#E4405F', '#FF0000']
                        }]
                    },
                    options: { responsive: true, maintainAspectRatio: false }
                });

            } catch (e) {
                console.error("Fetch error:", e);
                alert("無法連接到 AI 分析伺服器，請確保 app.py 已啟動");
            }
        }
    </script>
</body>
</html>
