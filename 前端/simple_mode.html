<!DOCTYPE html>
<html lang="zh-Hant">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI 活動人流預測系統</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        * {
            box-sizing: border-box;
        }

        body {

            margin: 0;

            font-family: "Microsoft JhengHei", sans-serif;

            background: #F5F1EA;

            display: flex;

            height: 100vh;

            overflow: hidden;
        }

        /* =========================================
           LEFT
        ========================================= */

        .sidebar-left {

            width: 260px;

            background: #7A0000;

            color: white;

            padding: 20px;

            overflow-y: auto;
        }

        .logo {

            font-size: 28px;

            font-weight: 900;

            margin-bottom: 25px;

            border-bottom: 2px solid gold;

            padding-bottom: 10px;
        }

        .menu-box {

            background: rgba(255,255,255,0.12);

            border-radius: 10px;

            padding: 15px;

            margin-bottom: 20px;
        }

        .menu-title {

            font-size: 18px;

            font-weight: bold;

            margin-bottom: 10px;
        }

        .menu-box ul {

            padding-left: 18px;

            line-height: 1.8;
        }

        /* =========================================
           CENTER
        ========================================= */

        .main-content {

            flex: 1;

            overflow-y: auto;

            padding: 20px;
        }

        .top-card {

            background: white;

            border-radius: 16px;

            padding: 25px;

            box-shadow: 0 4px 15px rgba(0,0,0,0.05);

            margin-bottom: 20px;
        }

        .prediction-title {

            font-size: 28px;

            font-weight: bold;

            color: #7A0000;
        }

        .prediction-value {

            font-size: 72px;

            font-weight: 900;

            color: #7A0000;

            margin-top: 10px;
        }

        .confidence {

            color: #666;

            margin-top: 10px;

            font-size: 16px;
        }

        .metric-grid {

            display: grid;

            grid-template-columns: repeat(4, 1fr);

            gap: 15px;

            margin-top: 20px;
        }

        .metric-card {

            background: #FAF8F4;

            border: 1px solid #eee;

            border-radius: 12px;

            padding: 15px;
        }

        .metric-label {

            color: #777;

            font-size: 14px;
        }

        .metric-value {

            margin-top: 6px;

            font-size: 24px;

            font-weight: bold;

            color: #333;
        }

        .chart-grid {

            display: grid;

            grid-template-columns: 1fr 1fr;

            gap: 20px;

            margin-top: 20px;
        }

        .chart-card {

            background: white;

            border-radius: 16px;

            padding: 20px;

            height: 420px;

            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .chart-title {

            font-size: 18px;

            font-weight: bold;

            color: #7A0000;

            margin-bottom: 15px;
        }

        .timeline-card {

            margin-top: 20px;

            background: white;

            border-radius: 16px;

            padding: 20px;

            height: 450px;

            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* =========================================
           RIGHT PANEL
        ========================================= */

        .sidebar-right {

            width: 360px;

            background: white;

            padding: 20px;

            overflow-y: auto;

            border-left: 1px solid #eee;
        }

        .panel-title {

            font-size: 26px;

            font-weight: bold;

            color: #7A0000;

            margin-bottom: 20px;
        }

        .section-title {

            margin-top: 20px;

            margin-bottom: 10px;

            font-size: 18px;

            font-weight: bold;

            color: #7A0000;

            border-bottom: 2px solid #eee;

            padding-bottom: 5px;
        }

        .input-group {

            margin-bottom: 12px;
        }

        .input-group label {

            display: block;

            margin-bottom: 5px;

            font-weight: bold;

            color: #555;

            font-size: 14px;
        }

        .input-group input,
        .input-group select {

            width: 100%;

            padding: 10px;

            border-radius: 8px;

            border: 1px solid #ccc;

            font-size: 14px;
        }

        .hidden {

            display: none;
        }

        .btn-run {

            width: 100%;

            padding: 15px;

            border: none;

            border-radius: 10px;

            background: #7A0000;

            color: white;

            font-size: 20px;

            font-weight: bold;

            cursor: pointer;

            margin-top: 20px;
        }

        .btn-run:hover {

            background: #A30000;
        }

    </style>

</head>

<body>

    <!-- =========================================
         LEFT
    ========================================= -->

    <div class="sidebar-left">

        <div class="logo">
            AI Event Forecast
        </div>

        <div class="menu-box">

            <div class="menu-title">
                功能
            </div>

            <ul>

                <li>Attendance Forecast</li>

                <li>Timeline Prediction</li>

                <li>Bootstrap Confidence</li>

                <li>Trend Analysis</li>

            </ul>

        </div>

    </div>

    <!-- =========================================
         CENTER
    ========================================= -->

    <div class="main-content">

        <div class="top-card">

            <div class="prediction-title">
                AI 預測 Attendance
            </div>

            <div class="prediction-value"
                 id="predictionValue">

                --

            </div>

            <div class="confidence"
                 id="confidenceText">

                95% 信賴區間：--

            </div>

            <div class="metric-grid">

                <div class="metric-card">

                    <div class="metric-label">
                        預測人數
                    </div>

                    <div class="metric-value"
                         id="optimizedPrediction">

                        --

                    </div>

                </div>

                <div class="metric-card">

                    <div class="metric-label">
                        成長率
                    </div>

                    <div class="metric-value"
                         id="improvementPct">

                        --

                    </div>

                </div>

                <div class="metric-card">

                    <div class="metric-label">
                        核心因子
                    </div>

                    <div class="metric-value"
                         id="topDriver">

                        --

                    </div>

                </div>

                <div class="metric-card">

                    <div class="metric-label">
                        Reward Score
                    </div>

                    <div class="metric-value"
                         id="rewardValue">

                        --

                    </div>

                </div>

            </div>

        </div>

        <!-- CHARTS -->

        <div class="chart-grid">

            <div class="chart-card">

                <div class="chart-title">
                    Prediction Comparison
                </div>

                <canvas id="roiChart"></canvas>

            </div>

            <div class="chart-card">

                <div class="chart-title">
                    Feature Importance
                </div>

                <canvas id="importanceChart"></canvas>

            </div>

        </div>

        <!-- TIMELINE -->

        <div class="timeline-card">

            <div class="chart-title">
                Attendance Timeline Forecast
            </div>

            <canvas id="timelineChart"></canvas>

        </div>

    </div>

    <!-- =========================================
         RIGHT
    ========================================= -->

    <div class="sidebar-right">

        <div class="panel-title">
            活動參數
        </div>

        <!-- EVENT TYPE -->

        <div class="input-group">

            <label>活動類型</label>

            <select id="event_type"
                    onchange="toggleFields()">

                <option value="registration_based">
                    報名制活動
                </option>

                <option value="open_access">
                    開放式活動
                </option>

            </select>

        </div>

        <!-- CATEGORY -->

        <div class="input-group">

            <label>活動分類</label>

            <select id="event_category"></select>

        </div>

        <!-- COMMON -->

        <div class="section-title">
            通用參數
        </div>

        <div class="input-group">

            <label>活動前幾天</label>

            <input type="number"
                   id="days_before_event"
                   value="30">

        </div>

        <div class="input-group">

            <label>Weather Score</label>

            <input type="number"
                   step="0.01"
                   id="weather_score"
                   value="0.9">

        </div>

        <div class="input-group">

            <label>Holiday Score</label>

            <input type="number"
                   id="holiday_score"
                   value="1">

        </div>

        <div class="input-group">

            <label>Venue Capacity</label>

            <input type="number"
                   id="venue_capacity"
                   value="5000">

        </div>

        <!-- SOCIAL -->

        <div class="section-title">
            社群數據
        </div>

        <div class="input-group">

            <label>IG Exposure</label>

            <input type="number"
                   id="ig_exposure"
                   value="30000">

        </div>

        <div class="input-group">

            <label>FB Exposure</label>

            <input type="number"
                   id="fb_exposure"
                   value="50000">

        </div>

        <div class="input-group">

            <label>Threads Exposure</label>

            <input type="number"
                   id="threads_exposure"
                   value="10000">

        </div>

        <div class="input-group">

            <label>Trend Velocity</label>

            <input type="number"
                   id="trend_velocity"
                   value="5000">

        </div>

        <!-- MARKETING -->

        <div class="section-title">
            Marketing
        </div>

        <div class="input-group">

            <label>Reward Score</label>

            <input type="number"
                   step="0.01"
                   id="reward_score"
                   value="0.5">

        </div>

        <div class="input-group">

            <label>Marketing Push</label>

            <input type="number"
                   step="0.01"
                   id="marketing_push_score"
                   value="0.6">

        </div>

        <!-- REG -->

        <div id="registrationFields">

            <div class="section-title">
                報名制活動
            </div>

            <div class="input-group">

                <label>Registration Count</label>

                <input type="number"
                       id="registration_count"
                       value="3000">

            </div>

            <div class="input-group">

                <label>Registration Growth</label>

                <input type="number"
                       id="registration_growth_rate"
                       value="200">

            </div>

            <div class="input-group">

                <label>Historical Show Rate</label>

                <input type="number"
                       step="0.01"
                       id="historical_show_rate"
                       value="0.88">

            </div>

            <div class="input-group">

                <label>Duration Hours</label>

                <input type="number"
                       id="duration_hours"
                       value="6">

            </div>

            <div class="input-group">

                <label>Influencer Score</label>

                <input type="number"
                       step="0.01"
                       id="influencer_score"
                       value="0.7">

            </div>

        </div>

        <!-- OPEN -->

        <div id="openFields"
             class="hidden">

            <div class="section-title">
                開放式活動
            </div>

            <div class="input-group">

                <label>Nearby Foot Traffic</label>

                <input type="number"
                       id="nearby_foot_traffic"
                       value="50000">

            </div>

            <div class="input-group">

                <label>Foot Traffic Growth</label>

                <input type="number"
                       id="foot_traffic_growth"
                       value="3000">

            </div>

            <div class="input-group">

                <label>Venue Visibility</label>

                <input type="number"
                       step="0.01"
                       id="venue_visibility_score"
                       value="0.9">

            </div>

            <div class="input-group">

                <label>Booth Count</label>

                <input type="number"
                       id="booth_count"
                       value="40">

            </div>

            <div class="input-group">

                <label>Live Performance</label>

                <input type="number"
                       step="0.01"
                       id="live_performance_score"
                       value="0.8">

            </div>

            <div class="input-group">

                <label>Transport Accessibility</label>

                <input type="number"
                       step="0.01"
                       id="transport_accessibility"
                       value="0.9">

            </div>

        </div>

        <button class="btn-run"
                onclick="runPrediction()">

            執行 AI 分析

        </button>

    </div>

    <script>

        let roiChart;
        let importanceChart;
        let timelineChart;

        // =========================================
        // TOGGLE
        // =========================================

        function toggleFields() {

            const eventType =
                document.getElementById(
                    "event_type"
                ).value;

            const reg =
                document.getElementById(
                    "registrationFields"
                );

            const open =
                document.getElementById(
                    "openFields"
                );

            const category =
                document.getElementById(
                    "event_category"
                );

            if (
                eventType ===
                "registration_based"
            ) {

                reg.classList.remove(
                    "hidden"
                );

                open.classList.add(
                    "hidden"
                );

                category.innerHTML = `

                    <option value="歌唱比賽">
                        歌唱比賽
                    </option>

                    <option value="書法">
                        書法
                    </option>

                    <option value="天赦日">
                        天赦日
                    </option>
                `;

            } else {

                open.classList.remove(
                    "hidden"
                );

                reg.classList.add(
                    "hidden"
                );

                category.innerHTML = `

                    <option value="乞龜">
                        乞龜
                    </option>

                    <option value="關公誕辰">
                        關公誕辰
                    </option>

                    <option value="盂蘭盆節">
                        盂蘭盆節
                    </option>

                    <option value="新春團拜">
                        新春團拜
                    </option>
                `;
            }
        }

        // =========================================
        // PAYLOAD
        // =========================================

        function buildPayload() {

            const eventType =
                document.getElementById(
                    "event_type"
                ).value;

            let payload = {

                event_type: eventType,

                event_category:
                    document.getElementById(
                        "event_category"
                    ).value,

                days_before_event:
                    parseInt(
                        document.getElementById(
                            "days_before_event"
                        ).value
                    ),

                weather_score:
                    parseFloat(
                        document.getElementById(
                            "weather_score"
                        ).value
                    ),

                holiday_score:
                    parseInt(
                        document.getElementById(
                            "holiday_score"
                        ).value
                    ),

                venue_capacity:
                    parseInt(
                        document.getElementById(
                            "venue_capacity"
                        ).value
                    ),

                ig_exposure:
                    parseInt(
                        document.getElementById(
                            "ig_exposure"
                        ).value
                    ),

                fb_exposure:
                    parseInt(
                        document.getElementById(
                            "fb_exposure"
                        ).value
                    ),

                threads_exposure:
                    parseInt(
                        document.getElementById(
                            "threads_exposure"
                        ).value
                    ),

                trend_velocity:
                    parseInt(
                        document.getElementById(
                            "trend_velocity"
                        ).value
                    ),

                reward_score:
                    parseFloat(
                        document.getElementById(
                            "reward_score"
                        ).value
                    ),

                marketing_push_score:
                    parseFloat(
                        document.getElementById(
                            "marketing_push_score"
                        ).value
                    )
            };

            if (
                eventType ===
                "registration_based"
            ) {

                payload.registration_count =
                    parseInt(
                        document.getElementById(
                            "registration_count"
                        ).value
                    );

                payload.registration_growth_rate =
                    parseInt(
                        document.getElementById(
                            "registration_growth_rate"
                        ).value
                    );

                payload.historical_show_rate =
                    parseFloat(
                        document.getElementById(
                            "historical_show_rate"
                        ).value
                    );

                payload.duration_hours =
                    parseInt(
                        document.getElementById(
                            "duration_hours"
                        ).value
                    );

                payload.influencer_score =
                    parseFloat(
                        document.getElementById(
                            "influencer_score"
                        ).value
                    );

            } else {

                payload.nearby_foot_traffic =
                    parseInt(
                        document.getElementById(
                            "nearby_foot_traffic"
                        ).value
                    );

                payload.foot_traffic_growth =
                    parseInt(
                        document.getElementById(
                            "foot_traffic_growth"
                        ).value
                    );

                payload.venue_visibility_score =
                    parseFloat(
                        document.getElementById(
                            "venue_visibility_score"
                        ).value
                    );

                payload.booth_count =
                    parseInt(
                        document.getElementById(
                            "booth_count"
                        ).value
                    );

                payload.live_performance_score =
                    parseFloat(
                        document.getElementById(
                            "live_performance_score"
                        ).value
                    );

                payload.transport_accessibility =
                    parseFloat(
                        document.getElementById(
                            "transport_accessibility"
                        ).value
                    );
            }

            return payload;
        }

        // =========================================
        // RUN
        // =========================================

        async function runPrediction() {

            try {

                const payload =
                    buildPayload();

                // =====================================
                // PREDICT
                // =====================================

                const response =
                    await fetch(
                        "http://127.0.0.1:8000/predict",
                        {

                            method: "POST",

                            headers: {
                                "Content-Type":
                                    "application/json"
                            },

                            body:
                                JSON.stringify(
                                    payload
                                )
                        }
                    );

                const data =
                    await response.json();

                // =====================================
                // MAIN
                // =====================================

                document.getElementById(
                    "predictionValue"
                ).innerText =
                    data.prediction.toLocaleString();

                document.getElementById(
                    "confidenceText"
                ).innerText =
                    `95% 信賴區間：${data.CI_95_lower.toLocaleString()} ~ ${data.CI_95_upper.toLocaleString()}`;

                document.getElementById(
                    "optimizedPrediction"
                ).innerText =
                    data.prediction.toLocaleString();

                document.getElementById(
                    "improvementPct"
                ).innerText =
                    "--";

                document.getElementById(
                    "topDriver"
                ).innerText =
                    "marketing_push_score";

                document.getElementById(
                    "rewardValue"
                ).innerText =
                    payload.reward_score;

                // =====================================
                // ROI CHART
                // =====================================

                const roiCtx =
                    document.getElementById(
                        "roiChart"
                    ).getContext("2d");

                if (roiChart)
                    roiChart.destroy();

                roiChart = new Chart(
                    roiCtx,
                    {

                        type: "bar",

                        data: {

                            labels: [
                                "Prediction"
                            ],

                            datasets: [{

                                label:
                                    "Attendance",

                                data: [
                                    data.prediction
                                ]
                            }]
                        },

                        options: {

                            responsive: true,

                            maintainAspectRatio:
                                false
                        }
                    }
                );

                // =====================================
                // IMPORTANCE
                // =====================================

                const fakeImportance = {

                    ig_exposure: 0.31,

                    fb_exposure: 0.28,

                    marketing_push_score: 0.22,

                    reward_score: 0.14,

                    weather_score: 0.05
                };

                const sortedImportance =
                    Object.entries(
                        fakeImportance
                    )

                    .sort(
                        (a, b) =>
                            b[1] - a[1]
                    );

                const impCtx =
                    document.getElementById(
                        "importanceChart"
                    ).getContext("2d");

                if (importanceChart)
                    importanceChart.destroy();

                importanceChart =
                    new Chart(
                        impCtx,
                        {

                            type: "bar",

                            data: {

                                labels:
                                    sortedImportance
                                    .map(x => x[0]),

                                datasets: [{

                                    label:
                                        "Importance",

                                    data:
                                        sortedImportance
                                        .map(x => x[1])
                                }]
                            },

                            options: {

                                indexAxis: "y",

                                responsive: true,

                                maintainAspectRatio:
                                    false
                            }
                        }
                    );

                // =====================================
                // TIMELINE
                // =====================================

                const timelineResponse =
                    await fetch(
                        "http://127.0.0.1:8000/forecast_timeline",
                        {

                            method: "POST",

                            headers: {
                                "Content-Type":
                                    "application/json"
                            },

                            body:
                                JSON.stringify(
                                    payload
                                )
                        }
                    );

                const timelineData =
                    await timelineResponse.json();

                const timeline =
                    timelineData.timeline;

                const labels =
                    timeline.map(
                        x =>
                        `D-${x.days_before_event}`
                    );

                const predictions =
                    timeline.map(
                        x => x.prediction
                    );

                const lower =
                    timeline.map(
                        x => x.lower
                    );

                const upper =
                    timeline.map(
                        x => x.upper
                    );

                const timeCtx =
                    document.getElementById(
                        "timelineChart"
                    ).getContext("2d");

                if (timelineChart)
                    timelineChart.destroy();

                timelineChart =
                    new Chart(
                        timeCtx,
                        {

                            type: "line",

                            data: {

                                labels: labels,

                                datasets: [

                                    {

                                        label:
                                            "Prediction",

                                        data:
                                            predictions,

                                        tension: 0.3
                                    },

                                    {

                                        label:
                                            "Lower CI",

                                        data:
                                            lower,

                                        borderDash:
                                            [5, 5],

                                        tension: 0.3
                                    },

                                    {

                                        label:
                                            "Upper CI",

                                        data:
                                            upper,

                                        borderDash:
                                            [5, 5],

                                        tension: 0.3
                                    }
                                ]
                            },

                            options: {

                                responsive: true,

                                maintainAspectRatio:
                                    false
                            }
                        }
                    );

            } catch (err) {

                console.error(err);

                alert(
                    "API 連線失敗"
                );
            }
        }

        // =========================================
        // INIT
        // =========================================

        window.onload = () => {

            toggleFields();

            runPrediction();
        };

    </script>

</body>

</html>
